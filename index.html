<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <title>PetShop Amigo Fiel</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>

<img src="img/logo-transparente.png"
alt="Logo do PetShop amigo fiel"
width = "100"
>
</div>
<button id="menu-btn">☰</button>
<nav id="menu">
  <a href="#home">Home</a>
    <a href="#servicos">serviços</a>
      <a href="#galeria">Galeria</a>
        <a href="#contato">Contador</a>
          <a href="#localizacao">localização</a>
</nav>

</header>

    </section>

        <img src="img/banho.png" alt="servico de banho"

      </div>
    </section>
      <div class="card">
        <img src="img/tosa.png" alt="servico de banho"

      </div>
      <div class="card">
        <img src="img/veterinario.png" alt="servico de banho"
        <h3>veterinario</h3>
        <p>consultas e vacinas.</p>
      </div>
</div>








    <!-- GALERIA -->

    <!-- CONTATO -->

    <section id="localizacao" class="container"></section>

    <!-- FOOTER -->
    <footer></footer>

    <script src="js/script.js"></script>
